<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern File Upload - Ask Expert</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .upload-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            max-width: 800px;
            width: 100%;
            padding: 40px;
        }

        .upload-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .upload-header h2 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .upload-header p {
            color: #666;
            font-size: 16px;
        }

        .upload-methods {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .upload-method {
            border: 2px dashed #ddd;
            border-radius: 15px;
            padding: 30px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #fafafa;
        }

        .upload-method:hover {
            border-color: #667eea;
            background: #f0f4ff;
            transform: translateY(-2px);
        }

        .upload-method.active {
            border-color: #667eea;
            background: #e8f0ff;
        }

        .upload-method i {
            font-size: 48px;
            color: #667eea;
            margin-bottom: 15px;
            display: block;
        }

        .upload-method h3 {
            color: #333;
            font-size: 18px;
            margin-bottom: 8px;
        }

        .upload-method p {
            color: #666;
            font-size: 14px;
        }

        .file-input {
            display: none;
        }

        .drop-zone {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            background: #f8f9ff;
            margin: 20px 0;
            transition: all 0.3s ease;
        }

        .drop-zone.dragover {
            background: #e8f0ff;
            border-color: #4a5fc1;
        }

        .drop-zone i {
            font-size: 64px;
            color: #667eea;
            margin-bottom: 20px;
            display: block;
        }

        .drop-zone h3 {
            color: #333;
            font-size: 20px;
            margin-bottom: 10px;
        }

        .drop-zone p {
            color: #666;
            font-size: 16px;
        }

        .file-preview {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .file-item {
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 10px;
            text-align: center;
            background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .file-item img {
            width: 100%;
            height: 120px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 8px;
        }

        .file-item .file-name {
            font-size: 12px;
            color: #666;
            margin-bottom: 5px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .file-item .file-size {
            font-size: 11px;
            color: #999;
        }

        .file-item .remove-btn {
            background: #ff4757;
            color: white;
            border: none;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            cursor: pointer;
            margin-top: 5px;
            font-size: 12px;
        }

        .upload-progress {
            margin: 20px 0;
            display: none;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #f0f0f0;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.3s ease;
        }

        .upload-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: block;
            margin: 20px auto;
        }

        .upload-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .upload-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .camera-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .camera-container {
            background: white;
            border-radius: 15px;
            padding: 20px;
            max-width: 600px;
            width: 90%;
        }

        .camera-video {
            width: 100%;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .camera-controls {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .camera-btn {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .capture-btn {
            background: #667eea;
            color: white;
        }

        .cancel-btn {
            background: #f0f0f0;
            color: #666;
        }

        .mobile-optimized {
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        @media (max-width: 768px) {
            .upload-container {
                padding: 20px;
            }

            .upload-methods {
                grid-template-columns: 1fr;
            }

            .upload-method {
                padding: 20px 15px;
            }

            .drop-zone {
                padding: 30px 20px;
            }
        }

        /* Icons using Unicode */
        .icon-folder::before { content: "📁"; }
        .icon-camera::before { content: "📷"; }
        .icon-drag::before { content: "📤"; }
        .icon-mobile::before { content: "📱"; }
    </style>
</head>
<body>
    <div class="upload-container">
        <div class="upload-header">
            <h2>📸 Upload Images for Expert Review</h2>
            <p>Share photos to help experts understand your car problem better</p>
        </div>

        <div class="upload-methods">
            <div class="upload-method mobile-optimized" onclick="openFilePicker()">
                <i class="icon-folder"></i>
                <h3>Browse Files</h3>
                <p>Choose from your device</p>
            </div>

            <div class="upload-method mobile-optimized" onclick="openCamera()">
                <i class="icon-camera"></i>
                <h3>Take Photo</h3>
                <p>Use camera capture</p>
            </div>

            <div class="upload-method mobile-optimized" onclick="activateDragDrop()">
                <i class="icon-drag"></i>
                <h3>Drag & Drop</h3>
                <p>Drop files here</p>
            </div>

            <div class="upload-method mobile-optimized" onclick="openMobileUpload()">
                <i class="icon-mobile"></i>
                <h3>Mobile Upload</h3>
                <p>Optimized for mobile</p>
            </div>
        </div>

        <div class="drop-zone" id="dropZone" style="display: none;">
            <i class="icon-drag"></i>
            <h3>Drop files here</h3>
            <p>or click to browse</p>
        </div>

        <input type="file" id="fileInput" class="file-input" multiple accept="image/*,.pdf,.doc,.docx">
        <input type="file" id="cameraInput" class="file-input" accept="image/*" capture="camera">

        <div class="file-preview" id="filePreview"></div>

        <div class="upload-progress" id="uploadProgress">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <p id="progressText">Uploading... 0%</p>
        </div>

        <button class="upload-btn" id="uploadBtn" onclick="uploadFiles()" disabled>
            Upload Images
        </button>
    </div>

    <!-- Camera Modal -->
    <div class="camera-modal" id="cameraModal">
        <div class="camera-container">
            <video id="cameraVideo" class="camera-video" autoplay></video>
            <div class="camera-controls">
                <button class="camera-btn capture-btn" onclick="capturePhoto()">📸 Capture</button>
                <button class="camera-btn cancel-btn" onclick="closeCamera()">❌ Cancel</button>
            </div>
        </div>
    </div>

    <script>
        let uploadedFiles = [];
        let currentMethod = null;
        let stream = null;

        // File picker method
        function openFilePicker() {
            document.getElementById('fileInput').click();
            currentMethod = 'file_picker';
        }

        // Camera method
        function openCamera() {
            if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment' },
                    audio: false 
                })
                .then(function(s) {
                    stream = s;
                    const video = document.getElementById('cameraVideo');
                    video.srcObject = stream;
                    document.getElementById('cameraModal').style.display = 'flex';
                })
                .catch(function(err) {
                    alert('Camera access denied: ' + err.message);
                });
            } else {
                // Fallback to file input with camera
                document.getElementById('cameraInput').click();
                currentMethod = 'camera';
            }
        }

        function closeCamera() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
            document.getElementById('cameraModal').style.display = 'none';
        }

        function capturePhoto() {
            const video = document.getElementById('cameraVideo');
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0);
            
            canvas.toBlob(function(blob) {
                const file = new File([blob], 'camera_capture.jpg', { type: 'image/jpeg' });
                addFileToPreview(file);
                closeCamera();
            }, 'image/jpeg', 0.8);
        }

        // Drag & Drop method
        function activateDragDrop() {
            const dropZone = document.getElementById('dropZone');
            dropZone.style.display = 'block';
            currentMethod = 'drag_drop';
        }

        // Mobile upload method
        function openMobileUpload() {
            document.getElementById('fileInput').click();
            currentMethod = 'mobile';
        }

        // File input handlers
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const files = Array.from(e.target.files);
            files.forEach(file => addFileToPreview(file));
        });

        document.getElementById('cameraInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                addFileToPreview(file);
            }
        });

        // Drag & Drop handlers
        const dropZone = document.getElementById('dropZone');

        dropZone.addEventListener('dragover', function(e) {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', function(e) {
            e.preventDefault();
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', function(e) {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            
            const files = Array.from(e.dataTransfer.files);
            files.forEach(file => addFileToPreview(file));
        });

        dropZone.addEventListener('click', function() {
            document.getElementById('fileInput').click();
        });

        // Add file to preview
        function addFileToPreview(file) {
            if (!file.type.startsWith('image/') && !file.type.includes('pdf')) {
                alert('Only images and PDFs are allowed');
                return;
            }

            if (file.size > 10 * 1024 * 1024) {
                alert('File size must be less than 10MB');
                return;
            }

            const fileId = Date.now() + '_' + Math.random().toString(36).substr(2, 9);
            uploadedFiles.push({
                id: fileId,
                file: file,
                method: currentMethod
            });

            const preview = document.getElementById('filePreview');
            const fileItem = document.createElement('div');
            fileItem.className = 'file-item';
            fileItem.id = 'file_' + fileId;

            if (file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    fileItem.innerHTML = `
                        <img src="${e.target.result}" alt="${file.name}">
                        <div class="file-name">${file.name}</div>
                        <div class="file-size">${formatFileSize(file.size)}</div>
                        <button class="remove-btn" onclick="removeFile('${fileId}')">✕</button>
                    `;
                };
                reader.readAsDataURL(file);
            } else {
                fileItem.innerHTML = `
                    <div style="font-size: 48px; margin-bottom: 10px;">📄</div>
                    <div class="file-name">${file.name}</div>
                    <div class="file-size">${formatFileSize(file.size)}</div>
                    <button class="remove-btn" onclick="removeFile('${fileId}')">✕</button>
                `;
            }

            preview.appendChild(fileItem);
            updateUploadButton();
        }

        // Remove file
        function removeFile(fileId) {
            uploadedFiles = uploadedFiles.filter(f => f.id !== fileId);
            document.getElementById('file_' + fileId).remove();
            updateUploadButton();
        }

        // Update upload button
        function updateUploadButton() {
            const uploadBtn = document.getElementById('uploadBtn');
            uploadBtn.disabled = uploadedFiles.length === 0;
            uploadBtn.textContent = uploadedFiles.length > 0 ? 
                `Upload ${uploadedFiles.length} File${uploadedFiles.length > 1 ? 's' : ''}` : 
                'Upload Images';
        }

        // Format file size
        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        // Upload files
        async function uploadFiles() {
            if (uploadedFiles.length === 0) return;

            const progressDiv = document.getElementById('uploadProgress');
            const progressFill = document.getElementById('progressFill');
            const progressText = document.getElementById('progressText');
            const uploadBtn = document.getElementById('uploadBtn');

            progressDiv.style.display = 'block';
            uploadBtn.disabled = true;
            uploadBtn.textContent = 'Uploading...';

            const requestId = new URLSearchParams(window.location.search).get('request_id') || '1';

            try {
                for (let i = 0; i < uploadedFiles.length; i++) {
                    const fileObj = uploadedFiles[i];
                    const formData = new FormData();
                    formData.append('file', fileObj.file);
                    formData.append('request_id', requestId);
                    formData.append('method', fileObj.method);

                    const endpoint = getUploadEndpoint(fileObj.method);
                    
                    const response = await fetch(endpoint, {
                        method: 'POST',
                        body: formData
                    });

                    const result = await response.json();

                    if (!response.ok) {
                        throw new Error(result.error || 'Upload failed');
                    }

                    // Update progress
                    const progress = ((i + 1) / uploadedFiles.length) * 100;
                    progressFill.style.width = progress + '%';
                    progressText.textContent = `Uploading... ${Math.round(progress)}%`;
                }

                // Success
                progressText.textContent = '✅ Upload completed successfully!';
                setTimeout(() => {
                    alert('Files uploaded successfully!');
                    window.location.reload();
                }, 1000);

            } catch (error) {
                console.error('Upload error:', error);
                progressText.textContent = '❌ Upload failed: ' + error.message;
                uploadBtn.disabled = false;
                uploadBtn.textContent = 'Retry Upload';
            }
        }

        // Get upload endpoint based on method
        function getUploadEndpoint(method) {
            const baseUrl = '/upload';
            switch (method) {
                case 'camera':
                    return baseUrl + '/camera';
                case 'drag_drop':
                    return baseUrl + '/drag-drop';
                case 'mobile':
                    return baseUrl + '/mobile';
                default:
                    return baseUrl + '/file-picker';
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            updateUploadButton();
        });
    </script>
</body>
</html>
